version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: studyquest-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - studyquest-network

  redis:
    image: redis:7.0-alpine
    container_name: studyquest-redis
    ports:
      - "6379:6379"
    networks:
      - studyquest-network

  studyquest-backend-1:
    build: .
    container_name: studyquest-backend-1
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/studyquest
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - mongodb
      - redis
    networks:
      - studyquest-network

  studyquest-backend-2:
    build: .
    container_name: studyquest-backend-2
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/studyquest
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - mongodb
      - redis
    networks:
      - studyquest-network

  studyquest-backend-3:
    build: .
    container_name: studyquest-backend-3
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/studyquest
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - mongodb
      - redis
    networks:
      - studyquest-network

  nginx-lb:
    image: nginx:alpine
    container_name: studyquest-nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - studyquest-backend-1
      - studyquest-backend-2
      - studyquest-backend-3
    networks:
      - studyquest-network

volumes:
  mongo-data:

networks:
  studyquest-network:
    driver: bridge
